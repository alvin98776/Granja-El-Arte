<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }

    header {
      background: #3498db;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
    }

    @media (min-width: 768px) {
      main {
        flex-direction: row;
      }
      .card {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Responsive Page</h1>
  </header>

  <main>
    <div class="card">
      <h2>Section 1</h2>
      <p>This section adapts to screen size.</p>
    </div>
    <div class="card">
      <h2>Section 2</h2>
      <p>This is also responsive content.</p>
    </div>
  </main>
</body>
</html>
